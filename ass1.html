<!DOCTYPE html>
<html lang="en">
<head>
    <style>
         body {
      background-color: #85e5ec;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
      font-family: sans-serif;
    }
    .logo-container {
        
        border:  5px solid #0047AB;
        border-radius: 50%;
        padding: 10px;
        background: white;
        width: 200px;
        height: 200px;
        display: flex;
        justify-content: center;
        align-items: center;
        object-fit: cover;
        box-shadow: 0 0 20px green;
        margin-top: 50px;

    }
    .logo-container img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
    }
    h2 {
        top: 40px;
        position: absolute;
        font-size: 25px;
        color: rgb(0, 0, 0);
    }
    


    
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="logo-container">
    <img src="https://tse3.mm.bing.net/th/id/OIP.52qlKoYWpiI8idsScjhPQAAAAA?pid=Api&P=0&h=180" alt="University Logo" >
   
</body>
</html>
