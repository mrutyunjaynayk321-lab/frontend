<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATM PIN Verification</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
            background-color: #f2f2f2;
        }
        h2 {
            text-align: center;
        }
        input, button {
            padding: 8px;
            margin-top: 10px;
            font-size: 16px;
        }
        #result {
            font-weight: bold;
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h2><center>🏧 ATM PIN VERIFICATION</center></h2>
    <label>Enter your 4-digit PIN:</label><br>
    <input type="password" id="pinINPUT" maxlength="4">
    <br>
    <button onclick="verifyPIN()">Submit</button>
    <div id="result"></div>

    <script>
        let correctPIN = "1234";
        let attempts = 0;
        const maxAttempts = 3;

        function verifyPIN() {
            const userPIN = document.getElementById("pinINPUT").value;
            const result = document.getElementById("result");

           
            do {
                if (userPIN === correctPIN) {
                    result.innerHTML = "✅ Access Granted. Welcome!";
                    result.style.color = "green";
                    document.getElementById("pinINPUT").disabled = true;
                    return;
                } else {
                    attempts++;
                    break; 
                }
            } while (false);

           
            if (attempts < maxAttempts) {
                result.innerHTML = `❌ Incorrect PIN. Attempt ${attempts} of ${maxAttempts}`;
                result.style.color = "red";
                document.getElementById("pinINPUT").value = "";
            } else {
                result.innerHTML = "🔒 Card Blocked. Too many wrong attempts!";
                result.style.color = "red";
                document.getElementById("pinINPUT").disabled = true;
            }
        }
    </script>

</body>
</html>
