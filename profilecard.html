<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Profile Card</title>
	<link rel="stylesheet" href="external.css">
	<style>
		.card {
			width: 300px;
			margin: 50px auto;
			padding: 20px;
			background-color: #f0f0f0;
			border: 1px solid #ddd;
			border-radius: 10px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
			text-align: center;
		}
		
		.card img {
			width: 100px;
			height: 100px;
			border-radius: 50%;
			margin-bottom: 20px;
		}
		
		.card .bio {
			margin-bottom: 20px;
		}
	</style>
</head>
</head>
<body>
    <h1>Welcome to my Profile Card</h1>
	<div class="card">
		<img src="https://www.shutterstock.com/shutterstock/photos/2071252046/display_1500/stock-photo-portrait-of-cheerful-male-international-indian-student-with-backpack-learning-accessories-standing-2071252046.jpg" alt="Profile Image">
		<h2>M.Nayak</h2>
		<p class="bio">Software developer with a passion for learning and building innovative solutions.</p>
		<button style="background-color: #4CAF50; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Follow</button>
	</div>
</body>
</html>
