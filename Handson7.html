<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   
    <title>Supermarket Bill</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(26, 219, 219);
            padding: 20px;
        }

        .container {
            max-width: 400px;
            background-color: rgb(233, 3, 202);
            padding: 20px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px green;
        }

        h2 {
            text-align: center;
            color: rgb(42, 42, 51);
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid skyblue;
        }

        button {
            background: rgb(52, 229, 7);
            color: aliceblue;
            padding: 10px;
            width: 100%;
            margin-top: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: rgb(128, 9, 232);
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: rgb(10, 10, 30);
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🛒 Super Market Bill</h2>

        <label>Rice (₹50/kg)</label>
        <input type="number" id="riceQty" placeholder="Enter kg">

        <label>Milk (₹30/litre):</label>
        <input type="number" id="milkQty" placeholder="Enter litres">

        <label>Fruits (₹80/kg)</label>
        <input type="number" id="fruitsQty" placeholder="Enter kg">

        <button onclick="generateBill()">Calculate Bill</button>

        <div id="billOutput" class="result"></div>
    </div>

    <script>
        
        function CalculateItemTotal(price, quantity) {
            return price * quantity;
        }

        
        function generateBill() {
            const riceQty = parseFloat(document.getElementById("riceQty").value) || 0;
            const milkQty = parseFloat(document.getElementById("milkQty").value) || 0;
            const fruitsQty = parseFloat(document.getElementById("fruitsQty").value) || 0;

            const riceTotal = CalculateItemTotal(50, riceQty);
            const milkTotal = CalculateItemTotal(30, milkQty);
            const fruitsTotal = CalculateItemTotal(80, fruitsQty);

            let total = riceTotal + milkTotal + fruitsTotal;

           
            if (total >= 300) {
                total -= 30;
            }

            
            document.getElementById("billOutput").textContent = "🧾 Final Bill Amount: ₹" + total.toFixed(2);
        }
    </script>

</body>
</html>
