<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Template Row & Grid Template Columns</title>
</head>
<body>
    <div style="display: grid; grid-template-columns: 100px 150px; grid-template-rows: 50px 80px; gap: 5px;">
        <div style="background: yellow;">BOX A</div>
        <div style="background: rgb(8, 197, 214);">BOX B</div>
        <div style="background: lightcoral;">BOX C</div>
        <div style="background: rgb(20, 213, 158);">BOX D</div>

    </div>
    
</body>
</html>
