<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style> 
    ul li:first-child{
        color: aquamarine;
        font-weight: bold;
        font-size: 20px;
    }
    </style>
</head>
<body>
    <h1>First-Child Example</h1>
    <p>This first item in this list is styled using <code>:first-Child</code>.</p>
    <ul>
        <li>first item</li>
        <li>2nd item</li>
        <li> 3rd item</li>
    
    
    
</body>
</html>
