      margin-left: 0px;
      flex: 1;
      padding: 2rem;

      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

      height: 90px;

      flex-direction: column;
    }
    .banner{
        padding:10px;
        background-color: rgba(0, 0, 0, 0.162);
    }
    .banner img{
        width:100%;
    }
